{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow border-0 rounded-4">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Asset Inventory</h5>
            <a href="/" class="btn btn-outline-secondary btn-sm">Back to Menu</a>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr><th>Name</th><th>Type</th><th>Coords (Lon/Lat)</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody>
                    {% for a in assets %}
                    <tr id="row-{{ a.id }}">
                        <td class="fw-bold">{{ a.name }}</td>
                        <td><span class="badge bg-info text-white">{{ a.asset_type }}</span></td>
                        <td class="small">{{ "%.4f"|format(a.lon) }}, {{ "%.4f"|format(a.lat) }}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-primary" onclick="editAsset({{ a.id }}, '{{ a.name }}', '{{ a.asset_type }}', {{ a.lon }}, {{ a.lat }})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteAsset({{ a.id }})">Delete</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="editForm" class="modal-content">
            <div class="modal-header"><h5>Edit Asset</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <input type="text" id="editName" class="form-control mb-2" placeholder="Name" required>
                <input type="text" id="editType" class="form-control mb-2" placeholder="Type" required>
                <div class="row">
                    <div class="col"><input type="number" step="any" id="editLon" class="form-control" required></div>
                    <div class="col"><input type="number" step="any" id="editLat" class="form-control" required></div>
                </div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-success">Update Asset</button></div>
        </form>
    </div>
</div>

<script>
function deleteAsset(id) {
    if(confirm('Permanently delete this asset?')) {
        fetch(`/api/assets/${id}`, { method: 'DELETE' }).then(() => location.reload());
    }
}

function editAsset(id, name, type, lon, lat) {
    document.getElementById('editId').value = id;
    document.getElementById('editName').value = name;
    document.getElementById('editType').value = type;
    document.getElementById('editLon').value = lon;
    document.getElementById('editLat').value = lat;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

document.getElementById('editForm').onsubmit = (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const data = {
        name: document.getElementById('editName').value,
        asset_type: document.getElementById('editType').value,
        longitude: parseFloat(document.getElementById('editLon').value),
        latitude: parseFloat(document.getElementById('editLat').value)
    };
    fetch(`/api/assets/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(() => location.reload());
};
</script>
{% endblock %}
