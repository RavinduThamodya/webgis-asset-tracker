{% extends "layout.html" %}
{% block content %}
<div class="container mt-5 py-5 text-center">
    <h2 class="fw-bold mb-5">Administrative Dashboard</h2>
    <div class="row g-4 justify-content-center">
        <div class="col-md-3">
            <a href="/map" class="card shadow-sm border-0 p-4 text-decoration-none hover-shadow">
                <i class="bi bi-map-fill fs-1 text-primary mb-3"></i>
                <h5 class="fw-bold text-dark">Map View</h5>
                <p class="text-muted small">Live asset visualization</p>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/admin" class="card shadow-sm border-0 p-4 text-decoration-none hover-shadow">
                <i class="bi bi-people-fill fs-1 text-success mb-3"></i>
                <h5 class="fw-bold text-dark">User Approvals</h5>
                <p class="text-muted small">Manage registrations</p>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/manage-assets" class="card shadow-sm border-0 p-4 text-decoration-none hover-shadow">
                <i class="bi bi-list-task fs-1 text-warning mb-3"></i>
                <h5 class="fw-bold text-dark">Asset Records</h5>
                <p class="text-muted small">Bulk edit & delete</p>
            </a>
        </div>
    </div>
</div>
<style>.hover-shadow:hover { transition: 0.3s; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }</style>
{% endblock %}
