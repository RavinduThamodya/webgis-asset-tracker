<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AssetTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    {% block head %}{% endblock %}
    <style>
        .navbar { background: #1a252f; border-bottom: 3px solid #3498db; }
        .nav-link { font-weight: 600; transition: 0.3s; }
        .nav-link:hover { color: #3498db !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-geo-alt-fill text-primary me-2"></i>AssetTracker
            </a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if current_user.is_authenticated %}
                    <a class="nav-link text-white me-4" href="/">
                        <i class="bi bi-house-door-fill me-1"></i> Home
                    </a>
                    <a class="btn btn-danger btn-sm px-4 rounded-pill fw-bold" href="/logout">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
