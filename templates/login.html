{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="height: 80vh;">
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4 fw-bold">Sign In</h3>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}<div class="alert alert-danger py-2">{{ messages[0] }}</div>{% endif %}
                    {% endwith %}
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control rounded-pill" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control rounded-pill" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow">Login</button>
                    </form>
                    <div class="text-center mt-3 small">
                        Don't have an account? <a href="/register" class="text-decoration-none">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
